name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: postgresql+asyncpg://fintrack:secret@localhost:5432/fintrack_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: ci-test-secret-key-do-not-use-in-production
  APP_ENV: development

jobs:
  # ── 1. Lint & type-check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Ruff (lint + import sort)
        run: ruff check app/ tests/

      - name: Mypy (static type check)
        run: mypy app/

  # ── 2. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fintrack
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: fintrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fintrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── 3. Build Docker image ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --target runtime -t fintrack:${{ github.sha }} .

      - name: Check container starts
        run: |
          docker run --rm -d \
            -e DATABASE_URL=postgresql+asyncpg://x:x@localhost/x \
            -e SECRET_KEY=test \
            -p 8000:8000 \
            --name test_container \
            fintrack:${{ github.sha }} || true
          sleep 3
          docker stop test_container 2>/dev/null || true